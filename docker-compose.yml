# Spring Cloud Alibaba 演示栈 + Nacos + 周期性压测流量（curl）
#
# 在 本文件所在目录 执行: docker compose up --build
# 构建上下文为上级目录，需与 spring-insight 仓库同级（见 Dockerfile）
#
# 【重要】首次 up --build 时，Nacos 会马上有日志；其余 5 个服务要先「构建镜像」
# （镜像内 Maven 编译 spring-insight + 全部模块，常需 5～20 分钟），这段时间默认几乎无新日志。
# 建议另开终端执行（可看编译进度）:
#   set DOCKER_BUILDKIT=1
#   set BUILDKIT_PROGRESS=plain
#   docker compose build
# 再执行: docker compose up
# 或限制并行构建避免内存吃满: set COMPOSE_PARALLEL_LIMIT=1
#
# 控制台：http://localhost:8080/   Nacos：http://localhost:8848/nacos （nacos/nacos）
name: spring-insight-sca-demo

x-sca-build: &sca-build
  context: ..
  dockerfile: spring-insight-sca-demo/Dockerfile

services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    networks: [sca]
    healthcheck:
      # 官方镜像含 curl；若本机镜像异常可暂时注释 healthcheck
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8848/nacos/v1/console/health/readiness >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 90s

  sca-product:
    build:
      <<: *sca-build
      target: product
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
    networks: [sca]

  sca-loyalty:
    build:
      <<: *sca-build
      target: loyalty
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
    networks: [sca]

  sca-user:
    build:
      <<: *sca-build
      target: user
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
      sca-loyalty:
        condition: service_started
    networks: [sca]

  sca-order:
    build:
      <<: *sca-build
      target: order
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
      sca-user:
        condition: service_started
      sca-product:
        condition: service_started
    networks: [sca]

  sca-gateway:
    build:
      <<: *sca-build
      target: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
      sca-order:
        condition: service_started
    networks: [sca]

  traffic:
    image: curlimages/curl:8.5.0
    depends_on:
      sca-gateway:
        condition: service_started
    # 必须让整段脚本作为 sh -c 的「一个」参数，否则会变成 sleep 收到多余参数而报错
    command:
      - sh
      - -c
      - |
          sleep 40
          while true; do
            curl -sS "http://sca-gateway:8080/order/create?userId=1&productId=1" || true
            echo ""
            sleep 10
          done
    networks: [sca]

networks:
  sca:
    driver: bridge
