# Spring Cloud Alibaba 演示栈 + Nacos + 周期性压测流量（curl）
# 在 本文件所在目录 执行: docker compose up --build
# 构建上下文为上级目录，需与 spring-insight 仓库同级（见 Dockerfile 说明）
# 控制台：网关 http://localhost:8080/ （Spring Insight UI）；Nacos http://localhost:8848/nacos （nacos/nacos）
name: spring-insight-sca-demo

services:
  nacos:
    image: nacos/nacos-server:v3.1.1
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    networks: [sca]

  sca-product:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/Dockerfile
      target: product
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - nacos
    networks: [sca]

  sca-loyalty:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/Dockerfile
      target: loyalty
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - nacos
    networks: [sca]

  sca-user:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/Dockerfile
      target: user
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - nacos
      - sca-loyalty
    networks: [sca]

  sca-order:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/Dockerfile
      target: order
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - nacos
      - sca-user
      - sca-product
    networks: [sca]

  sca-gateway:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/Dockerfile
      target: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - nacos
      - sca-order
    networks: [sca]

  traffic:
    image: curlimages/curl:8.5.0
    depends_on:
      - sca-gateway
    entrypoint: ["/bin/sh", "-c"]
    command: >
      sleep 40 &&
      while true; do
        curl -sS "http://sca-gateway:8080/order/create?userId=1&productId=1" || true;
        echo "";
        sleep 10;
      done
    networks: [sca]

networks:
  sca:
    driver: bridge
