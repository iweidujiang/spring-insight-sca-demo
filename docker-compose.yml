name: spring-insight-sca-demo

x-sca-env: &sca-env
  SPRING_PROFILES_ACTIVE: docker
  SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: ${NACOS_USERNAME:-nacos}
  SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD:-nacos}

services:
  sca-nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: sca-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-security}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-0123456789abcdefghijklmnopqrstuvwxyz0123456789abcdefghijklmnopqrstuvwxyz}
      SPRING_SECURITY_USER_NAME: ${NACOS_USERNAME:-nacos}
      SPRING_SECURITY_USER_PASSWORD: ${NACOS_PASSWORD:-nacos}
    ports:
      - "38080:8080"
      - "38848:8848"
      - "39848:9848"
    networks: [sca-net]

  sca-product:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/sca-product/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
    environment:
      <<: *sca-env
    depends_on:
      sca-nacos:
        condition: service_started
    networks: [sca-net]

  sca-loyalty:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/sca-loyalty/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
    environment:
      <<: *sca-env
    depends_on:
      sca-nacos:
        condition: service_started
    networks: [sca-net]

  sca-user:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/sca-user/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
    environment:
      <<: *sca-env
    depends_on:
      sca-nacos:
        condition: service_started
      sca-loyalty:
        condition: service_started
    networks: [sca-net]

  sca-order:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/sca-order/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
    ports:
      - "8081:18081"
    environment:
      <<: *sca-env
    depends_on:
      sca-nacos:
        condition: service_started
      sca-user:
        condition: service_started
      sca-product:
        condition: service_started
    networks: [sca-net]

  sca-gateway:
    build:
      context: ..
      dockerfile: spring-insight-sca-demo/sca-gateway/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
    ports:
      - "8080:18080"
    environment:
      <<: *sca-env
    depends_on:
      sca-nacos:
        condition: service_started
      sca-order:
        condition: service_started
    networks: [sca-net]

  traffic:
    profiles: ["traffic"]
    image: curlimages/curl:8.5.0
    depends_on:
      sca-gateway:
        condition: service_started
    command:
      - sh
      - -c
      - |
          sleep 40
          while true; do
            curl -sS "http://sca-gateway:18080/order/create?userId=1&productId=1" || true
            echo ""
            sleep 10
          done
    networks: [sca-net]

networks:
  sca-net:
    name: sca-net
    driver: bridge
