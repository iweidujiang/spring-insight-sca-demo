# 仅启动本 demo 各服务 + 压测 traffic，不包含 Nacos（请在本机先启动 nacos-standalone）。
#
# 所有服务加入外部网络 DOCKER_NETWORK（默认 my-network），与已运行的 Nacos 同网，
# 以便通过主机名 nacos-standalone:8848 注册发现（见各模块 application-docker.yml）。
#
# 前置：已在 spring-insight 父工程执行 mvn clean install -DskipTests；本机已有 Docker 网络
#（默认名 my-network）且 Nacos 容器已接入该网络。
#
# 需 Docker Compose v2.17+（additional_contexts）与 BuildKit。
# 网关 http://localhost:8080/ ；Nacos 控制台由你本机 nacos 容器映射（如 38848）
#
name: spring-insight-sca-demo

x-sca-build: &sca-build
  context: .
  dockerfile: Dockerfile
  additional_contexts:
    # 与 Maven settings.xml 中 <localRepository> 一致（含 io、org 的根目录）；由 compose-up 脚本或 .env 设置 MAVEN_LOCAL_REPOSITORY
    local_m2: ${MAVEN_LOCAL_REPOSITORY}

services:
  sca-product:
    build:
      <<: *sca-build
      target: product
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks: [sca]

  sca-loyalty:
    build:
      <<: *sca-build
      target: loyalty
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks: [sca]

  sca-user:
    build:
      <<: *sca-build
      target: user
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-loyalty:
        condition: service_started
    networks: [sca]

  sca-order:
    build:
      <<: *sca-build
      target: order
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-user:
        condition: service_started
      sca-product:
        condition: service_started
    networks: [sca]

  sca-gateway:
    build:
      <<: *sca-build
      target: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-order:
        condition: service_started
    networks: [sca]

  traffic:
    image: curlimages/curl:8.5.0
    depends_on:
      sca-gateway:
        condition: service_started
    command:
      - sh
      - -c
      - |
          sleep 40
          while true; do
            curl -sS "http://sca-gateway:8080/order/create?userId=1&productId=1" || true
            echo ""
            sleep 10
          done
    networks: [sca]

networks:
  sca:
    name: ${DOCKER_NETWORK:-my-network}
    external: true
