# 本地联调：Nacos + 全部 SCA 服务 + 周期性 curl 压测。
#
# 前置：已在 spring-insight 父工程执行 mvn clean install -DskipTests（Starter 在本机 ~/.m2）。
# 推荐一条命令：.\compose-up.ps1（Windows）或 bash compose-up.sh（macOS/Linux），
# 脚本会设置 LOCAL_M2_REPOSITORY 并启用 BuildKit。
#
# 需 Docker Compose v2.17+（additional_contexts）与 BuildKit。
# 网关控制台 http://localhost:8080/ ；Nacos 控制台 http://localhost:38848/nacos （nacos/nacos）
# 与本地单独启动的 Nacos 容器对齐：容器名 nacos-standalone，端口 38080:8080、38848:8848、39848:9848
#
name: spring-insight-sca-demo

x-sca-build: &sca-build
  context: .
  dockerfile: Dockerfile
  additional_contexts:
    local_m2: ${LOCAL_M2_REPOSITORY}

services:
  nacos:
    container_name: nacos-standalone
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "38080:8080"
      - "38848:8848"
      - "39848:9848"
    networks: [sca]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8848/nacos/v1/console/health/readiness >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 90s

  sca-product:
    build:
      <<: *sca-build
      target: product
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
    networks: [sca]

  sca-loyalty:
    build:
      <<: *sca-build
      target: loyalty
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
    networks: [sca]

  sca-user:
    build:
      <<: *sca-build
      target: user
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
      sca-loyalty:
        condition: service_started
    networks: [sca]

  sca-order:
    build:
      <<: *sca-build
      target: order
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
      sca-user:
        condition: service_started
      sca-product:
        condition: service_started
    networks: [sca]

  sca-gateway:
    build:
      <<: *sca-build
      target: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      nacos:
        condition: service_healthy
      sca-order:
        condition: service_started
    networks: [sca]

  traffic:
    image: curlimages/curl:8.5.0
    depends_on:
      sca-gateway:
        condition: service_started
    command:
      - sh
      - -c
      - |
          sleep 40
          while true; do
            curl -sS "http://sca-gateway:8080/order/create?userId=1&productId=1" || true
            echo ""
            sleep 10
          done
    networks: [sca]

networks:
  sca:
    driver: bridge
