# 仅启动本 demo 各服务 + 压测 traffic；Nacos 请在本机另行启动（如 nacos-standalone @ my-network）。
#
# 镜像构建极轻量：仅 COPY 各模块已打好的 fat jar（须先在项目根执行 mvnw package，compose-up 可自动执行）。
# 不再在 Docker 内跑 Maven，避免长时间「卡住」。
#
name: spring-insight-sca-demo

x-sca-build: &sca-build
  context: .
  dockerfile: Dockerfile

services:
  sca-product:
    build:
      <<: *sca-build
      target: product
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks: [sca]

  sca-loyalty:
    build:
      <<: *sca-build
      target: loyalty
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks: [sca]

  sca-user:
    build:
      <<: *sca-build
      target: user
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-loyalty:
        condition: service_started
    networks: [sca]

  sca-order:
    build:
      <<: *sca-build
      target: order
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-user:
        condition: service_started
      sca-product:
        condition: service_started
    networks: [sca]

  sca-gateway:
    build:
      <<: *sca-build
      target: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-order:
        condition: service_started
    networks: [sca]

  traffic:
    image: curlimages/curl:8.5.0
    depends_on:
      sca-gateway:
        condition: service_started
    command:
      - sh
      - -c
      - |
          sleep 40
          while true; do
            curl -sS "http://sca-gateway:8080/order/create?userId=1&productId=1" || true
            echo ""
            sleep 10
          done
    networks: [sca]

networks:
  sca:
    name: ${DOCKER_NETWORK:-my-network}
    external: true
