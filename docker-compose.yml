# 仅启动本 demo 各服务 + 压测 traffic；Nacos 在本机另行启动（如 nacos-standalone @ my-network）。
# 镜像构建：宿主机 mvnw package 后 Docker 仅 COPY fat jar。
#
# networks.demo_net 是 Compose 里的「逻辑名」，通过 name + external 指向已有 Docker 网络
# （默认与 Nacos 相同的 my-network），不是新建一套与 my-network 隔离的网络。
#
name: spring-insight-sca-demo

x-sca-build: &sca-build
  context: .
  dockerfile: Dockerfile

# 与 Nacos 控制台一致的默认账号；若你修改了 Nacos 用户，请在 .env 中设置 NACOS_USERNAME / NACOS_PASSWORD
x-nacos-auth: &nacos-auth
  SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: ${NACOS_USERNAME:-nacos}
  SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD:-nacos}

services:
  sca-product:
    build:
      <<: *sca-build
      target: product
    environment:
      <<: *nacos-auth
      SPRING_PROFILES_ACTIVE: docker
    networks: [demo_net]

  sca-loyalty:
    build:
      <<: *sca-build
      target: loyalty
    environment:
      <<: *nacos-auth
      SPRING_PROFILES_ACTIVE: docker
    networks: [demo_net]

  sca-user:
    build:
      <<: *sca-build
      target: user
    environment:
      <<: *nacos-auth
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-loyalty:
        condition: service_started
    networks: [demo_net]

  sca-order:
    build:
      <<: *sca-build
      target: order
    ports:
      - "8081:8081"
    environment:
      <<: *nacos-auth
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-user:
        condition: service_started
      sca-product:
        condition: service_started
    networks: [demo_net]

  sca-gateway:
    build:
      <<: *sca-build
      target: gateway
    ports:
      - "8080:8080"
    environment:
      <<: *nacos-auth
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      sca-order:
        condition: service_started
    networks: [demo_net]

  # 可选：持续向网关打 /order/create（默认不启用，避免「未调接口却不断有链路」）
  # 启用：docker compose --profile traffic up -d
  traffic:
    profiles: ["traffic"]
    image: curlimages/curl:8.5.0
    depends_on:
      sca-gateway:
        condition: service_started
    command:
      - sh
      - -c
      - |
          sleep 40
          while true; do
            curl -sS "http://sca-gateway:8080/order/create?userId=1&productId=1" || true
            echo ""
            sleep 10
          done
    networks: [demo_net]

networks:
  demo_net:
    name: ${DOCKER_NETWORK:-my-network}
    external: true
